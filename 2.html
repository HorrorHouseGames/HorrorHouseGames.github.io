<script type="text/javascript">
        var gk_isXlsx = false;
        var gk_xlsxFileLookup = {};
        var gk_fileData = {};
        function filledCell(cell) {
          return cell !== '' && cell != null;
        }
        function loadFileData(filename) {
        if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
            try {
                var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
                var firstSheetName = workbook.SheetNames[0];
                var worksheet = workbook.Sheets[firstSheetName];

                // Convert sheet to JSON to filter blank rows
                var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
                // Filter out blank rows (rows where all cells are empty, null, or undefined)
                var filteredData = jsonData.filter(row => row.some(filledCell));

                // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
                var headerRowIndex = filteredData.findIndex((row, index) =>
                  row.filter(filledCell).length >= filteredData[index + 1]?.filter(filledCell).length
                );
                // Fallback
                if (headerRowIndex === -1 || headerRowIndex > 25) {
                  headerRowIndex = 0;
                }

                // Convert filtered JSON back to CSV
                var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
                csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
                return csv;
            } catch (e) {
                console.error(e);
                return "";
            }
        }
        return gk_fileData[filename] || "";
        }
        </script><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stellar Games Studio</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: linear-gradient(135deg, #0a0a1a, #1c2526);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Arial', sans-serif;
      color: #fff;
    }
    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .content {
      z-index: 2;
      text-align: center;
      padding: 20px;
      max-width: 800px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 10px;
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }
    p, ul {
      font-size: 1.1rem;
      line-height: 1.6;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      margin: 0.5rem 0;
    }
    a {
      color: #4db8ff;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 10px;
      border-radius: 5px;
      pointer-events: none;
      z-index: 3;
      max-width: 200px;
      font-size: 0.9rem;
      display: none;
    }
  </style>
</head>
<body>
  <canvas id="smokeCanvas"></canvas>
  <div class="tooltip" id="tooltip"></div>
  <div class="content" id="content">
    <h1>Welcome to Stellar Games Studio</h1>
    <p>We craft immersive gaming experiences that transport players to new worlds. Explore our universe of games and join our journey.</p>
  </div>
  <script>
    const canvas = document.getElementById('smokeCanvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const contentDiv = document.getElementById('content');
    let particles = [];
    let mouse = { x: null, y: null, radius: 100 };

    // Set canvas size
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // Celestial body types
    const celestialTypes = [
      {
        type: 'planet',
        title: 'About Us',
        description: 'Learn about our mission to create innovative games.',
        content: `
          <h1>About Stellar Games Studio</h1>
          <p>Founded in 2020, Stellar Games Studio is dedicated to crafting immersive and innovative video games. Our team of passionate developers, artists, and storytellers work together to push the boundaries of interactive entertainment.</p>
          <ul>
            <li><strong>Mission:</strong> To create unforgettable gaming experiences.</li>
            <li><strong>Vision:</strong> To inspire players through storytelling and innovation.</li>
            <li><strong>Team:</strong> 50+ creatives across design, programming, and art.</li>
          </ul>
        `,
        size: 10,
        color: '#4db8ff',
        glow: 15
      },
      {
        type: 'moon',
        title: 'Our Games',
        description: 'Explore our portfolio of exciting titles.',
        content: `
          <h1>Our Games</h1>
          <p>Discover the worlds we've built for you to explore.</p>
          <ul>
            <li><strong>Star Odyssey:</strong> An open-world space adventure.</li>
            <li><strong>Quantum Rift:</strong> A fast-paced sci-fi shooter.</li>
            <li><strong>Echoes of Terra:</strong> A narrative-driven RPG.</li>
          </ul>
          <p><a href="https://stellargames.studio/games" target="_blank">View Full Portfolio</a></p>
        `,
        size: 6,
        color: '#b0b0b0',
        glow: 10
      },
      {
        type: 'sun',
        title: 'Careers',
        description: 'Join our team and shape the future of gaming.',
        content: `
          <h1>Join Our Team</h1>
          <p>We're always looking for talented individuals to join our studio.</p>
          <ul>
            <li><strong>Open Roles:</strong> Game Designer, 3D Artist, Programmer</li>
            <li><strong>Culture:</strong> Collaborative, creative, and inclusive</li>
            <li><strong>Benefits:</strong> Competitive salary, flexible hours, and more</li>
          </ul>
          <p><a href="https://stellargames.studio/careers" target="_blank">Apply Now</a></p>
        `,
        size: 15,
        color: '#ffaa33',
        glow: 20
      },
      {
        type: 'galaxy',
        title: 'Contact Us',
        description: 'Get in touch with our team.',
        content: `
          <h1>Contact Stellar Games Studio</h1>
          <p>We'd love to hear from you! Reach out with questions or feedback.</p>
          <ul>
            <li><strong>Email:</strong> contact@stellargames.studio</li>
            <li><strong>Phone:</strong> +1 (555) 123-4567</li>
            <li><strong>Address:</strong> 123 Cosmic Lane, Galaxy City, CA</li>
          </ul>
          <p><a href="https://stellargames.studio/contact" target="_blank">Contact Form</a></p>
        `,
        size: 12,
        color: '#8a2be2',
        glow: 18
      }
    ];

    // Particle class
    class Particle {
      constructor() {
        if (Math.random() < 0.05 && celestialTypes.length > particles.filter(p => p.isSpecial).length) {
          // Special celestial body
          const type = celestialTypes[particles.filter(p => p.isSpecial).length];
          this.isSpecial = true;
          this.type = type.type;
          this.title = type.title;
          this.description = type.description;
          this.content = type.content;
          this.size = type.size;
          this.color = type.color;
          this.glow = type.glow;
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.speedX = Math.random() * 0.2 - 0.1;
          this.speedY = Math.random() * 0.2 - 0.1;
          this.opacity = 0.8;
        } else {
          // Regular star
          this.isSpecial = false;
          this.type = 'star';
          this.size = Math.random() * 2 + 1;
          this.color = '#ffffff';
          this.glow = 5;
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.speedX = Math.random() * 0.3 - 0.15;
          this.speedY = Math.random() * 0.3 - 0.15;
          this.opacity = Math.random() * 0.5 + 0.3;
        }
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;

        // Interaction with mouse
        if (mouse.x !== null && mouse.y !== null) {
          let dx = mouse.x - this.x;
          let dy = mouse.y - this.y;
          let distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < mouse.radius) {
            let force = (mouse.radius - distance) / mouse.radius;
            this.x -= dx * force * (this.isSpecial ? 0.05 : 0.1);
            this.y -= dy * force * (this.isSpecial ? 0.05 : 0.1);
            this.opacity = Math.min(this.opacity + 0.01, this.isSpecial ? 1 : 0.8);
          } else {
            this.opacity = Math.max(this.opacity - 0.005, this.isSpecial ? 0.8 : 0.3);
          }

          // Tooltip for special particles
          if (this.isSpecial && distance < this.size + 10) {
            tooltip.style.display = 'block';
            tooltip.style.left = `${mouse.x + 15}px`;
            tooltip.style.top = `${mouse.y + 15}px`;
            tooltip.innerHTML = `<strong>${this.title}</strong><br>${this.description}`;
          }
        }

        // Wrap around canvas edges
        if (this.x < 0) this.x = canvas.width;
        if (this.x > canvas.width) this.x = 0;
        if (this.y < 0) this.y = canvas.height;
        if (this.y > canvas.height) this.y = 0;
      }

      draw() {
        ctx.save();
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();

        // Glow effect
        ctx.shadowBlur = this.glow;
        ctx.shadowColor = this.color;
        ctx.fillStyle = `rgba(${parseInt(this.color.slice(1, 3), 16)}, ${parseInt(this.color.slice(3, 5), 16)}, ${parseInt(this.color.slice(5, 7), 16)}, ${this.opacity})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    // Initialize particles
    function init() {
      particles = [];
      const particleCount = Math.floor((canvas.width * canvas.height) / 10000);
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }
    init();

    // Animation loop
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(particle => {
        particle.update();
        particle.draw();
      });
      requestAnimationFrame(animate);
    }
    animate();

    // Mouse interaction
    window.addEventListener('mousemove', (event) => {
      mouse.x = event.clientX;
      mouse.y = event.clientY;
      tooltip.style.display = 'none'; // Reset tooltip
    });

    // Click interaction
    canvas.addEventListener('click', (event) => {
      const rect = canvas.getBoundingClientRect();
      const x = event.clientX - rect.left;
      const y = event.clientY - rect.top;
      particles.forEach(particle => {
        if (particle.isSpecial) {
          let dx = x - particle.x;
          let dy = y - particle.y;
          let distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < particle.size + 10) {
            contentDiv.innerHTML = particle.content;
          }
        }
      });
    });

    // Touch interaction for mobile
    window.addEventListener('touchmove', (event) => {
      event.preventDefault();
      mouse.x = event.touches[0].clientX;
      mouse.y = event.touches[0].clientY;
      tooltip.style.display = 'none';
    });

    // Touch click
    canvas.addEventListener('touchstart', (event) => {
      const rect = canvas.getBoundingClientRect();
      const x = event.touches[0].clientX - rect.left;
      const y = event.touches[0].clientY - rect.top;
      particles.forEach(particle => {
        if (particle.isSpecial) {
          let dx = x - particle.x;
          let dy = y - particle.y;
          let distance = Math.sqrt(dx * dx + dy * dy);
          if (distance < particle.size + 10) {
            contentDiv.innerHTML = particle.content;
          }
        }
      });
    });

    // Reset mouse position when not interacting
    window.addEventListener('mouseout', () => {
      mouse.x = null;
      mouse.y = null;
      tooltip.style.display = 'none';
    });
    window.addEventListener('touchend', () => {
      mouse.x = null;
      mouse.y = null;
      tooltip.style.display = 'none';
    });

    // Reinitialize particles on resize
    window.addEventListener('resize', init);
  </script>
</body>
</html>
